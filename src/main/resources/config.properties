# TCP Forward - Archivo de configuración de ejemplo
# Copia este archivo y edita los valores según tu entorno.
# Uso: java -jar target/tcp-forward.jar --config config.properties

# ---- Conexión local (donde escucha el forwarder) ----
# local.host = 127.0.0.1
local.port = 9999

# ---- Servidor remoto al que reenviar el tráfico ----
remote.host = [IP_ADDRESS]
remote.port = [PORT]

# ---- Tiempo máximo de conexión en segundos (0 = sin límite) ----
# timeout = 0

# ---- Protocolo de lectura ----
# Valores: raw | length-prefixed
protocol = length-prefixed

# ---- Opciones para length-prefixed ----
# Tamaño del prefijo de longitud en bytes (1-4). Default: 2
prefix.size = 2

# Orden de bytes del número de longitud: big | little. Default: big
prefix.endianness = big

# Si el valor del prefijo incluye el tamaño de la cabecera misma: true | false. Default: false
prefix.includes.header = false
